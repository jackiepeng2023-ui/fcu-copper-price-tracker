name: Build and deploy Node.js app to Azure Web App - copper-tracker-D1499051

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # node_modules 不打包，讓 Azure 端（SCM_DO_BUILD_DURING_DEPLOYMENT=true）自己 npm install
      # 這樣 better-sqlite3 會在 Azure 的 glibc 環境上編譯，binary 相容
      - name: Zip artifact for deployment (excluding node_modules)
        run: |
          zip -r release.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "db/sqlite.db" \
            --exclude ".env" \
            --exclude ".DS_Store" \
            --exclude "*.log"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B04C433409AE455E9AA42E16D6B6FF71 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_157AC9F3A8FF4573B6736134D10F1E05 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_191EDF604E1C4845AC801D94F73C749F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'copper-tracker-D1499051'
          slot-name: 'Production'
          package: .

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B04C433409AE455E9AA42E16D6B6FF71 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_157AC9F3A8FF4573B6736134D10F1E05 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_191EDF604E1C4845AC801D94F73C749F }}

      - name: Stop App Service before deploy
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp stop --name copper-tracker-D1499051 --resource-group fcu-homework-rg

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'copper-tracker-D1499051'
          slot-name: 'Production'
          package: ./

      - name: Start App Service after deploy
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp start --name copper-tracker-D1499051 --resource-group fcu-homework-rg
